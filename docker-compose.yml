services:
  webapptrip2guide:
    image: joelrojasllauradoupc/webapptrip2guide:1.4.5.-60196a0
    ports:
      - "5173:5173"
    depends_on:
      - backendtrip2guide
    env_file:
      - .env.${DOCKER_PROFILE}
    restart: unless-stopped

  backofficetrip2guide:
    image: joelrojasllauradoupc/backofficetrip2guide:1.3.0-dbc846c
    ports:
      - "4200:4200"
    depends_on:
      - backendtrip2guide
    env_file:
      - .env.${DOCKER_PROFILE}
    restart: unless-stopped

  backendtrip2guide:
    image: joelrojasllauradoupc/backendtrip2guide:1.4.2-9b43ab5
    ports:
      - "1337:1337"
    depends_on:
      - mongodb
    env_file:
      - .env.${DOCKER_PROFILE}
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  matomo-db:
    image: mariadb:11
    profiles:
      - production
    restart: unless-stopped
    command: --max-allowed-packet=64MB
    environment:
      MYSQL_ROOT_PASSWORD: ${MATOMO_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MATOMO_DATABASE_NAME}
      MYSQL_USER: ${MATOMO_DATABASE_USER}
      MYSQL_PASSWORD: ${MATOMO_DATABASE_PASSWORD}
    volumes:
      - matomo_db_data:/var/lib/mysql

  matomo:
    image: matomo:5-apache
    profiles:
      - production
    restart: unless-stopped
    depends_on:
      - matomo-db
    ports:
      - "8080:80"
    environment:
      MATOMO_DATABASE_HOST: matomo-db
      MATOMO_DATABASE_USERNAME: ${MATOMO_DATABASE_USER}
      MATOMO_DATABASE_PASSWORD: ${MATOMO_DATABASE_PASSWORD}
      MATOMO_DATABASE_DBNAME: ${MATOMO_DATABASE_NAME}
    volumes:
      - matomo_data:/var/www/html

volumes:
  mongo_data:
  matomo_db_data:
  matomo_data:

x-environment-variables:
  profiles:
    development:
      DOCKER_PROFILE: development
    production:
      DOCKER_PROFILE: production