services:
  webapptrip2guide:
    image: joelrojasllauradoupc/webapptrip2guide:1.3.0-57ac490
    ports:
      - "5173:5173"
    depends_on:
      - backendtrip2guide
    env_file:
      - .env.${DOCKER_PROFILE}

  backofficetrip2guide:
    image: joelrojasllauradoupc/backofficetrip2guide:1.3.0-dbc846c
    ports:
      - "4200:4200"
    depends_on:
      - backendtrip2guide
    env_file:
      - .env.${DOCKER_PROFILE}

  backendtrip2guide:
    image: joelrojasllauradoupc/backendtrip2guide:1.3.0-e2d0262
    ports:
      - "1337:1337"
    depends_on:
      - mongodb
    env_file:
      - .env.${DOCKER_PROFILE}

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  matomo-db:
    image: mariadb:11
    profiles:
      - production
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MATOMO_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MATOMO_DATABASE_NAME}
      MYSQL_USER: ${MATOMO_DATABASE_USER}
      MYSQL_PASSWORD: ${MATOMO_DATABASE_PASSWORD}
    volumes:
      - matomo_db_data:/var/lib/mysql

  matomo:
    image: matomo:5-apache
    profiles:
      - production
    restart: unless-stopped
    depends_on:
      - matomo-db
    environment:
      MATOMO_DATABASE_HOST: matomo-db
      MATOMO_DATABASE_USERNAME: ${MATOMO_DATABASE_USER}
      MATOMO_DATABASE_PASSWORD: ${MATOMO_DATABASE_PASSWORD}
      MATOMO_DATABASE_DBNAME: ${MATOMO_DATABASE_NAME}
    volumes:
      - matomo_data:/var/www/html

  caddy:
    image: caddy:2
    profiles:
      - production
    restart: unless-stopped
    depends_on:
      - matomo
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  mongo_data:
  matomo_db_data:
  matomo_data:
  caddy_data:
  caddy_config:

x-environment-variables:
  profiles:
    development:
      DOCKER_PROFILE: development
    production:
      DOCKER_PROFILE: production